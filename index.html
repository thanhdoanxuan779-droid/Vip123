<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Tool Lô</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#111111">
<link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
<link rel="icon" type="image/png" sizes="512x512" href="icon-512.png">
<link rel="apple-touch-icon" sizes="512x512" href="icon-512.png">
<style>
.title{
  color:#7dd3fc;
  font-weight:700;
  text-align:center;
  margin:10px 0;
}

body{
  background:#0b141a;
  color:#e6edf3;
  font-family:sans-serif;
}

/* tabs */

.tabs{
  display:flex;
  gap:8px;
  margin-bottom:10px;
  overflow-x:auto;
}

.tab-btn{
  flex:1;
  padding:12px 4px;
  text-align:center;
  border-radius:10px;
  background:#1b2a32;
  font-weight:700;
  font-size:15px;
  color:#cfe6ee;
}

.tab-btn.active{
  background:#144d57;
  color:#fff;
}

.tab{display:none}
.tab.active{display:block}

/* box */

.box{
  background:#111b21;
  border:1px solid #22343c;
  border-radius:16px;
  padding:14px;
  margin-bottom:14px;
}

/* inputs layout */

.inputs{
  display:flex;
  gap:8px;
  margin-bottom:8px;
}

/* input + textarea */

input,textarea{
  width:100%;
  height:52px;
  padding:10px 12px;
  border-radius:12px;
  border:1px solid #2a3f47;
  background:#0b141a;
  color:#e6edf3;
  font-size:17px;
  font-weight:700;
  text-align:center;
  box-sizing:border-box;
}

textarea{
  height:58px;
  resize:none;
}

/* result */

.result{
  word-break:break-word;
  font-weight:800;
  color:#22c55e;
  margin-top:6px;
}

.count{
  font-size:13px;
  color:#8fa6ad;
  text-align:center;
}

/* buttons */

.actions{
  display:none;
  gap:8px;
  margin-top:8px;
}

button{
  flex:1;
  height:48px;
  border:none;
  border-radius:12px;
  font-weight:700;
  font-size:15px;
}

.copy{
  background:#1f8a99;
  color:#fff;
}

.del{
  background:#7a2e2e;
  color:#fff;
}

/* tab2 textarea */

#tab2 textarea{
  min-height:52px;
  font-size:15px;
}
</style>
</head>

<body>

<div class="container">

<div id="tab1" class="tab active">
<div class="title">CHẠM TỔNG</div>
</div>

<div id="tab2" class="tab">
<div class="title">GHÉP TRÙNG</div>
</div>

<div id="tab3" class="tab">
<div class="title">DÀN PHỨC HỢP</div>
</div>

<div class="title">BỘ TỔNG</div>
</div>

<div id="tab5" class="tab">
<div class="title">CHÉM DÀN</div>
</div>

<div id="tab6" class="tab">

<div class="title">GHÉP CHẠM TỔNG</div>

<div class="box">

<input id="ghep_dan" placeholder="Nhập dàn số">

<div style="display:flex;gap:8px;margin-top:8px">
  <input id="ghep_cham" placeholder="Chạm">
  <input id="ghep_tong" placeholder="Tổng">

<div style="display:flex;gap:8px;margin-top:8px">
  <input placeholder="Bộ">

<div style="display:flex;gap:8px;margin-top:8px">
  <input placeholder="Thêm">
  <input placeholder="Bỏ">
</div>

<div style="display:flex;gap:8px;margin-top:10px">
  <button>CHẠM</button>
  <button>GHÉP TỔNG</button>

  <button>GHÉP TRONG</button>
  <button>GHÉP NGOÀI</button>
</div>

<textarea placeholder="Kết quả" style="margin-top:8px"></textarea>

</div>

</div>
<div id="tab7" class="tab">

<div class="title">TẠO DÀN 2D-3D-4D</div>

<div class="box">

<!-- CÀNG -->
<div style="display:flex;gap:8px">
<input id="t7_cang5" placeholder="Càng 5D" oninput="calcTab7()">
<input id="t7_cang4" placeholder="Càng 4D" oninput="calcTab7()">
<input id="t7_cang3" placeholder="Càng 3D" oninput="calcTab7()">
</div>
<!-- DÀN -->
<div style="margin-top:8px">
<input id="t7_dan2" placeholder="Dàn 2D" oninput="calcTab7()">

<div style="display:flex;gap:8px;margin-top:6px">
<button onclick="pasteDan2()">DÁN</button>
</div>
</div>

<!-- CHẠM TỔNG -->
<div style="display:flex;gap:8px;margin-top:8px">
<input id="t7_cham" placeholder="Chạm" oninput="calcTab7()">
<input id="t7_tong" placeholder="Tổng" oninput="calcTab7()">
</div>

<!-- BỘ ĐẦU ĐUÔI -->
<div style="display:flex;gap:8px;margin-top:8px">
<input id="t7_bo" placeholder="Bộ" oninput="calcTab7()">
<input id="t7_dau" placeholder="Đầu" oninput="calcTab7()">
<input id="t7_duoi" placeholder="Đuôi" oninput="calcTab7()">
</div>

<!-- THÊM BỎ -->
<div style="display:flex;gap:8px;margin-top:8px">
<input id="t7_them" placeholder="Thêm" oninput="calcTab7()">
<input id="t7_boSo" placeholder="Bỏ" oninput="calcTab7()">
</div>

<div style="display:flex;gap:8px;margin-top:10px">
<button onclick="copyTab7()">COPY</button>
<button onclick="clearTab7()">XOÁ</button>
</div>

<div id="t7r" class="result"></div>
<div id="t7c" class="count"></div>

</div>

</div>
<script>
const MIN=4, MAX=40
const ALL_NUMS = Array.from({length:100},(_,i)=>i.toString().padStart(2,'0'))
const KEY='tool_lo1256_fix'

/* TAB */
function showTab(i){
save();  document.querySelectorAll('.tab').forEach((t,n)=>t.classList.toggle('active',n===i))
  document.querySelectorAll('.tab-btn').forEach((b,n)=>b.classList.toggle('active',n===i))
}

/* SAVE */
function save(){
  const d={}
  document.querySelectorAll('input,textarea').forEach(e=>{
  if(e.id) d[e.id]=e.value
})

  d.gr = document.getElementById('gr')?.innerText || ''
d.gc = document.getElementById('gc')?.innerText || ''
d.ghep_kq = document.getElementById('ghep_kq')?.value || ''
d.ghep_count = document.getElementById('ghep_count')?.innerText || ''
d.random_result = document.getElementById('random_result')?.innerText || '';
d.random_count_text = document.getElementById('random_count_text')?.innerText || '';
  d.chem_result = document.getElementById('chem_result')?.innerText || ''
  d.chem_count  = document.getElementById('chem_count')?.innerText || ''

  localStorage.setItem(KEY,JSON.stringify(d))
}
function load(){
  const d = JSON.parse(localStorage.getItem(KEY) || '{}')

  // Restore input + textarea
  Object.keys(d).forEach(id=>{
    const e = document.getElementById(id)
    if(!e) return

    if(e.tagName === 'INPUT' || e.tagName === 'TEXTAREA'){
      e.value = d[id]
    }
  })
if(d.ghep_kq){
  document.getElementById('ghep_kq').value = d.ghep_kq
  document.getElementById('ghep_count').innerText = d.ghep_count || ''
  document.getElementById('ghep_actions').style.display = 'flex'
}else{
  document.getElementById('ghep_actions').style.display = 'none'
}
  /* ===== TAB 2 – GHÉP TRÙNG ===== */
  if(d.gr){
    document.getElementById('gr').innerText = d.gr
    document.getElementById('gc').innerText = d.gc || ''
    document.getElementById('gact').style.display = 'flex'
  }else{
    document.getElementById('gact').style.display = 'none'
  }

  /* ===== TAB 5 – RANDOM ===== */
  if(d.random_result){
    document.getElementById('random_result').innerText = d.random_result
    document.getElementById('random_actions').style.display = 'flex'
  }else{
    document.getElementById('random_actions').style.display = 'none'
  }

  if(d.random_count_text){
    document.getElementById('random_count_text').innerText = d.random_count_text
  }

  /* ===== TAB 5 – CHÉM ===== */
  if(d.chem_result){
    document.getElementById('chem_result').innerText = d.chem_result
    document.getElementById('chem_actions').style.display = 'flex'
  }else{
    document.getElementById('chem_actions').style.display = 'none'
  }

  if(d.chem_count){
    document.getElementById('chem_count').innerText = d.chem_count
  }
}
/* TOOL */
const digits=id=>{
  const el=document.getElementById(id)
  if(!el) return []
  return (el.value||'')
    .replace(/\D/g,'')
    .split('')
    .map(Number)
}
const pairs=id=>{
  const el=document.getElementById(id)
  if(!el) return []

  let nums = (el.value.match(/\d{2}/g) || [])

  nums = nums
    .map(x=>parseInt(x))
    .filter(x=>x>=0 && x<=99)
    .map(x=>x.toString().padStart(2,'0'))

  return [...new Set(nums)]
}

/* ================= TAB 1 – CHẠM TỔNG ================= */
function gen(ch,tg,dau,duoi){
  return ALL_NUMS.filter(num=>{
    const a = +num[0]
    const b = +num[1]

    if(ch.length && !(ch.includes(a)||ch.includes(b))) return false
    if(tg.length && !tg.includes((a+b)%10)) return false
    if(dau.length && !dau.includes(a)) return false
    if(duoi.length && !duoi.includes(b)) return false

    return true
  })
}

function calc1(i){

  const ch   = digits('ch'+i)
  const tg   = digits('to'+i)
  const dau  = digits('da'+i)
  const duoi = digits('du'+i)
  const add  = pairs('add'+i)
  const sub  = pairs('sub'+i)

  if(
    !ch.length &&
    !tg.length &&
    !dau.length &&
    !duoi.length &&
    !add.length &&
    !sub.length
  ){
    out1(i,[])
    auto1()
    save()
    return
  }

  let r = add.length ? [...add] : [...ALL_NUMS]

  /* xác định dàn ban đầu */
  if(ch.length || tg.length || dau.length || duoi.length){

    r = ALL_NUMS.filter(n=>{
      const a = +n[0]
      const b = +n[1]

      if(ch.length && !(ch.includes(a) || ch.includes(b))) return false
      if(tg.length && !tg.includes((a+b)%10)) return false
      if(dau.length && !dau.includes(a)) return false
      if(duoi.length && !duoi.includes(b)) return false

      return true
    })

  }else if(add.length){

    r = [...new Set(add)]

  }

if(add.length){
  r = r.filter(x => add.includes(x))
}
if(sub.length){

  if(!r.length) r = [...ALL_NUMS]

  r = r.filter(x=>!sub.includes(x))

}

  /* sort */
  r = [...new Set(r)]
    .sort((a,b)=>parseInt(a)-parseInt(b))

  out1(i,r)
  auto1()
  save()
}
function out1(i,a){
  document.getElementById('r'+i).innerText=a.join(',')
  document.getElementById('c'+i).innerText=a.length?a.length+' số':''
  document.querySelector('#b1_'+i+' .actions').style.display=a.length?'flex':'none'
}

function auto1(){

  let last = MIN;

  for(let i=1;i<=MAX;i++){

    const ch  = document.getElementById('ch'+i)?.value.trim()
    const to  = document.getElementById('to'+i)?.value.trim()
    const da  = document.getElementById('da'+i)?.value.trim()
    const du  = document.getElementById('du'+i)?.value.trim()
    const add = document.getElementById('add'+i)?.value.trim()
    const sub = document.getElementById('sub'+i)?.value.trim()

    if(ch || to || da || du || add || sub){
      last = i
    }

  }

  last = Math.min(MAX, last + 1)
  last = Math.max(MIN, last)

  for(let i=1;i<=MAX;i++){
    const box = document.getElementById('b1_'+i)
    if(box){
      box.style.display = i <= last ? 'block' : 'none'
    }
  }

}
function render1(){
  let h='<div class="title">CHẠM TỔNG</div>';
  for(let i=1; i<=MAX; i++){
    // Chỉ hiện (block) nếu i <= 4, còn lại ẩn (none)
    let displayStyle = i <= MIN ? 'block' : 'none'; 
    h+=`
    <div class="box" id="b1_${i}" style="display:${displayStyle}">
      <div class="title">DÀN ${i}</div>
      <div class="inputs">
        <input id="ch${i}" placeholder="CHẠM" oninput="calc1(${i})">
        <input id="to${i}" placeholder="TỔNG" oninput="calc1(${i})">
      </div>
      <div class="inputs">
        <input id="da${i}" placeholder="ĐẦU" oninput="calc1(${i})">
        <input id="du${i}" placeholder="ĐUÔI" oninput="calc1(${i})">
      </div>
      <div class="inputs">
        <input id="add${i}" placeholder="THÊM" onpaste="setTimeout(()=>calc1(${i}),0)" oninput="calc1(${i})">
        <input id="sub${i}" placeholder="BỎ" onpaste="setTimeout(()=>calc1(${i}),0)" oninput="calc1(${i})">
      </div>
      <div class="result" id="r${i}"></div>
      <div class="count" id="c${i}"></div>
      <div class="actions">
        <button class="copy" onclick="navigator.clipboard.writeText(document.getElementById('r${i}').innerText)">COPY</button>
        <button class="del" onclick="['ch','to','da','du','add','sub'].forEach(x=>document.getElementById(x+'${i}').value='');calc1(${i})">XOÁ</button>
      </div>
    </div>`;
  }
  tab1.innerHTML=h;
}

function autoP(){
  let last=MIN
  for(let i=1;i<=MAX;i++){
    if(
      document.getElementById('pa'+i)?.value ||
      document.getElementById('pb'+i)?.value ||
      document.getElementById('pch'+i)?.value ||
      document.getElementById('pto'+i)?.value ||
      document.getElementById('pda'+i)?.value ||
      document.getElementById('pdu'+i)?.value ||
      document.getElementById('padd'+i)?.value ||
      document.getElementById('psub'+i)?.value
    ) last=i+1
  }
  last=Math.min(MAX,Math.max(MIN,last))
  for(let i=1;i<=MAX;i++){
    let box=document.getElementById('pbox'+i)
    if(box) box.style.display=i<=last?'block':'none'
  }
}
/* ================= TAB 2 – GHÉP TRÙNG ================= */
function render2(){
  let h='<div class="title">GHÉP TRÙNG</div>'
  for(let i=1;i<=MAX;i++){
    h+=`
    <div class="box" id="gbox${i}">
      <div class="title">DÀN ${i}</div>
      <textarea id="g${i}" oninput="calcG()"></textarea>
      <div class="actions" style="display:flex">
        <button class="copy" onclick="pasteG(${i})">DÁN</button>
        <button class="del" onclick="document.getElementById('g${i}').value='';calcG()">XOÁ</button>
      </div>
    </div>`
  }
  h+=`
  <div class="box">
    <div class="title">KẾT QUẢ</div>
    <div class="result" id="gr"></div>
    <div class="count" id="gc"></div>
    <div class="actions" id="gact">
  <button class="copy" onclick="navigator.clipboard.writeText(document.getElementById('gr').innerText)">COPY</button>
  <button class="copy" onclick="calcUnion()">GHÉP DÀN</button>
<button class="copy" onclick="calcG()">GHÉP TRÙNG</button>
<button class="copy" onclick="removeAllDuplicate()">LOẠI TRÙNG</button>
<button class="del" onclick="clearG()">XOÁ</button>
</div>
<div id="diffButtons" style="display:flex;flex-wrap:wrap;margin-top:6px"></div>
  </div>`
  tab2.innerHTML=h
  autoG()
}

async function pasteG(i){
  const t=await navigator.clipboard.readText()
  document.getElementById('g'+i).value=[...new Set(t.match(/\d{2}/g)||[])].join(',')
  calcG()
}

function calcG(){

  let sets = []

  for(let i=1;i<=MAX;i++){
    const v = document.getElementById('g'+i).value.trim()
    if(v){
      sets.push(
        [...new Set(v.match(/\d{2}/g) || [])]
      )
    }
  }

  if(sets.length < 2){
  document.getElementById('gr').innerText = ''
  document.getElementById('gc').innerText = ''
  document.getElementById('gact').style.display = 'none'
  document.getElementById('diffButtons').innerHTML = ''   // thêm dòng này
  save()
  return
}

  // intersection chuẩn
  let r = sets[0]

  for(let i=1;i<sets.length;i++){
    const setB = new Set(sets[i])
    r = r.filter(x => setB.has(x))
  }

  r = [...new Set(r)].sort()

  document.getElementById('gr').innerText = r.join(',')
  document.getElementById('gc').innerText = r.length ? r.length + ' số' : ''
  document.getElementById('gact').style.display = r.length ? 'flex' : 'none'

  generateDiffButtons()
  autoG()
  save()
}
function calcUnion(){

  let all = []

  for(let i=1;i<=MAX;i++){
    const v = document.getElementById('g'+i).value.trim()
    if(v){
      all.push(...(v.match(/\d{2}/g) || []))
    }
  }

  let r = [...new Set(all)]
  .map(x=>parseInt(x))
  .sort((a,b)=>a-b)
  .map(x=>x.toString().padStart(2,'0'))

  document.getElementById('gr').innerText = r.join(',')
  document.getElementById('gc').innerText =
    r.length ? r.length + ' số' : ''

  document.getElementById('gact').style.display =
    r.length ? 'flex' : 'none'

  generateDiffButtons()
  save()
}
function removeAllDuplicate(){

  let all = []

  for(let i=1;i<=MAX;i++){
    const v = document.getElementById('g'+i).value.trim()
    if(v){
      all.push(...(v.match(/\d{2}/g) || []))
    }
  }

  let count = {}

  all.forEach(n=>{
    count[n] = (count[n] || 0) + 1
  })

  let result = Object.keys(count)
    .filter(n => count[n] === 1)
    .map(x=>parseInt(x))
    .sort((a,b)=>a-b)
    .map(x=>x.toString().padStart(2,'0'))

  document.getElementById('gr').innerText = result.join(',')
  document.getElementById('gc').innerText =
    result.length ? result.length + ' số' : '0 số'

  // LUÔN HIỆN NÚT
  document.getElementById('gact').style.display = 'flex'

  save()
}
function autoG(){
  let last=MIN
  for(let i=1;i<=MAX;i++){
    if(document.getElementById('g'+i).value.trim()) last=i+1
  }
  last=Math.min(MAX,Math.max(MIN,last))
  for(let i=1;i<=MAX;i++)
    document.getElementById('gbox'+i).style.display=i<=last?'block':'none'
}
function clearG(){

  for(let i=1;i<=MAX;i++){
    const el = document.getElementById('g'+i)
    if(el) el.value=''
  }

  const ids=[
    'ghep_input',
    'ghep_kq',
    'ghep_cham',
    'ghep_tong',
    'ghep_dau',
    'ghep_duoi',
    'ghep_bo',
    'ghep_them',
    'ghep_boSo'
  ]

  ids.forEach(id=>{
    const el=document.getElementById(id)
    if(el) el.value=''
  })

  document.getElementById('gr').innerText=''
  document.getElementById('gc').innerText=''

  const act=document.getElementById('gact')
  if(act) act.style.display='none'

  document.getElementById('diffButtons').innerHTML=''

  save()
}
function generateDiffButtons(){

  const container = document.getElementById('diffButtons')
  if(!container) return

  container.innerHTML = ''

  let filled = []

  for(let i=1;i<=MAX;i++){
    const v = document.getElementById('g'+i)?.value.trim()
    if(v) filled.push(i)
  }

  if(filled.length < 2) return

  const a = filled[0]
  const b = filled[1]

  const btn1 = document.createElement('button')
  btn1.className = 'copy'
  btn1.innerText = `Dàn ${a} loại dàn ${b}`
  btn1.onclick = ()=> diffPair(a,b)

  const btn2 = document.createElement('button')
  btn2.className = 'copy'
  btn2.innerText = `Dàn ${b} loại dàn ${a}`
  btn2.onclick = ()=> diffPair(b,a)

  container.appendChild(btn1)
  container.appendChild(btn2)
}
function getDan(i){
  const v = document.getElementById('g'+i)?.value.trim()
  return v ? [...new Set(v.match(/\d{2}/g)||[])] : []
}

function diffPair(a,b){

  const A = getDan(a)
  const B = new Set(getDan(b))

  const result = A
  .filter(x=>!B.has(x))
  .map(x=>parseInt(x))
  .sort((a,b)=>a-b)
  .map(x=>x.toString().padStart(2,'0'))
  document.getElementById('gr').innerText = result.join(',')
  document.getElementById('gc').innerText =
    result.length ? result.length + ' số' : ''

  document.getElementById('gact').style.display =
    result.length ? 'flex' : 'none'

  save()
}
/* ================= TAB 3 – DÀN PHỨC HỢP ================= */
function render3(){
  let h='<div class="title">DÀN PHỨC HỢP</div>'
  for(let i=1;i<=MAX;i++){
    h+=`
    <div class="box" id="pbox${i}">
      <div class="title">DÀN ${i}</div>
      <div class="inputs">
        <input id="pa${i}" placeholder="SỐ A" oninput="calcP(${i})">
        <input id="pb${i}" placeholder="SỐ B" oninput="calcP(${i})">
      </div>
      <div class="inputs">
        <input id="pch${i}" placeholder="CHẠM" oninput="calcP(${i})">
        <input id="pto${i}" placeholder="TỔNG" oninput="calcP(${i})">
      </div>
<div class="inputs">
  <input id="pda${i}" placeholder="ĐẦU" oninput="calcP(${i})">
  <input id="pdu${i}" placeholder="ĐUÔI" oninput="calcP(${i})">
</div>

<div class="inputs">
  <input id="padd${i}" placeholder="THÊM" oninput="calcP(${i})">
  <input id="psub${i}" placeholder="BỎ" oninput="calcP(${i})">
</div>
      <div class="result" id="pr${i}"></div>
      <div class="count" id="pc${i}"></div>
      <div class="actions">
        <button class="copy" onclick="navigator.clipboard.writeText(pr${i}.innerText)">COPY</button>
        <button class="del" onclick="['pa','pb','pch','pto','pda','pdu','padd','psub'].forEach(x=>document.getElementById(x+'${i}').value='');calcP(${i})">XOÁ</button>
      </div>

function calcT(i){

  const raw = pairs('tb'+i)
  const tong = digits('tt'+i)
  const cham = digits('tch'+i)
  const add = pairs('tadd'+i)
  const sub = pairs('tsub'+i)
  const dau  = digits('tda'+i)
  const duoi = digits('tdu'+i)

  let r = add.length ? [...add] : []

  // Nếu có bộ → sinh từ bộ
  if(raw.length){
    r = []
    raw.forEach(num=>{
      const a = +num[0], b = +num[1]
      const ba = bong(a), bb = bong(b)

      r.push(
        ''+a+b,''+b+a,
        ''+a+bb,''+bb+a,
        ''+ba+b,''+b+ba,
        ''+ba+bb,''+bb+ba
      )
    })
    r = [...new Set(r)]
  }

  // Nếu không có bộ nhưng có điều kiện → chạy 100 số
  if(!raw.length && (tong.length || cham.length || dau.length || duoi.length)){
    r = [...ALL_NUMS]
  }

  // Lọc tổng
  if(tong.length){
    r = r.filter(n => tong.includes((+n[0] + +n[1]) % 10))
  }

  // Lọc chạm
  if(cham.length){
    r = r.filter(n => cham.includes(+n[0]) || cham.includes(+n[1]))
  }

  // Lọc đầu
  if(dau.length){
    r = r.filter(n => dau.includes(+n[0]))
  }

  // Lọc đuôi
  if(duoi.length){
    r = r.filter(n => duoi.includes(+n[1]))
  }

  // THÊM = dàn lọc
  if(add.length){
    r = r.filter(x => add.includes(x))
  }

  // BỎ
  if(sub.length){
    if(!r.length) r = [...ALL_NUMS]
    r = r.filter(x => !sub.includes(x))
  }

  r = [...new Set(r)]
    .map(x=>parseInt(x))
    .sort((a,b)=>a-b)
    .map(x=>x.toString().padStart(2,'0'))

  document.getElementById('tr'+i).innerText = r.join(',')
  document.getElementById('tc'+i).innerText = r.length ? r.length+' số' : ''
  document.querySelector('#tbox'+i+' .actions').style.display = r.length ? 'flex' : 'none'

  autoT()
  save()
}
function autoT(){

      document.getElementById('tda'+i).value ||
      document.getElementById('tdu'+i).value ||
      document.getElementById('tadd'+i).value ||

    }

  }
}

function runChem(type){

  document.getElementById('chem_result').innerText = ''
  document.getElementById('chem_count').innerText = ''

  const base = getChemDan()
  let sizeInit = base.length

  if(sizeInit < 1){
    alert('Chưa có dàn')
    return
  }

  // xác định mức bắt đầu theo số lượng
  let startX = Math.floor(sizeInit / 10)

  if(startX > 9) startX = 9
  if(startX < 0) startX = 0

  let output = ''
  let lastCount = 0

  for(let x = startX; x >= 0; x--){

    // số giữ chuẩn 96→6
    let keep = 96 - (9 - x) * 10

    if(keep > base.length) keep = base.length
    if(keep < 1) keep = 1

    let r = []

    if(type === 'tren'){
      r = base.slice(0, keep)
    }

    else if(type === 'duoi'){
      r = base.slice(base.length - keep)
    }

    else if(type === 'hai'){
      let half = Math.floor(keep / 2)
      r = [
        ...base.slice(0, half),
        ...base.slice(base.length - (keep - half))
      ]
    }

    else if(type === 'giua'){
      let start = Math.floor((base.length - keep) / 2)
      r = base.slice(start, start + keep)
    }

    lastCount = r.length

    output += x + 'x (' + r.length + ' số)\n'
    output += r.join(',') + '\n\n'
  }

  document.getElementById('chem_result').innerText = output
  document.getElementById('chem_count').innerText = '0x còn ' + lastCount + ' số'
  document.getElementById('chem_actions').style.display = 'flex'

  save()
}
function taoDan(){

  document.getElementById('chem_result').innerText = ''
  document.getElementById('chem_count').innerText = ''

  const base = getChemDan()
  let sizeInit = base.length

  if(sizeInit < 1){
    alert('Chưa có dàn')
    return
  }

  // xác định mức bắt đầu theo số lượng dàn
  let startX = Math.floor(sizeInit / 10)

  if(startX > 9) startX = 9
  if(startX < 0) startX = 0

  // random dàn
  let randomDan = [...base]

  for(let i = randomDan.length - 1; i > 0; i--){
    let j = Math.floor(Math.random() * (i + 1))
    ;[randomDan[i], randomDan[j]] = [randomDan[j], randomDan[i]]
  }

  let output = ''

  for(let x = startX; x >= 0; x--){

    let keep = 96 - (9 - x) * 10

    if(keep > randomDan.length) keep = randomDan.length
    if(keep < 1) keep = 1

    let r = randomDan.slice(0, keep)

    let sortedDan = r
      .map(x=>parseInt(x))
      .sort((a,b)=>a-b)
      .map(x=>x.toString().padStart(2,'0'))

    output += x + 'x (' + sortedDan.length + ' số)\n'
    output += sortedDan.join(',') + '\n\n'
  }

  document.getElementById('chem_result').innerText = output
  document.getElementById('chem_count').innerText = '0x còn ' + (randomDan.length < 6 ? randomDan.length : 6) + ' số'
  document.getElementById('chem_actions').style.display = 'flex'

  save()
}

  const input = document.getElementById('random_count')
  let qty = parseInt(input.value)

  if(isNaN(qty) || qty <= 0){
    alert("Nhập số lượng")
    return
  }

  if(qty > 100) qty = 100

  let nums = []

  while(nums.length < qty){

    let n = Math.floor(Math.random()*100)
      .toString()
      .padStart(2,'0')

    if(!nums.includes(n)){
      nums.push(n)
    }

  }

  nums.sort((a,b)=>parseInt(a)-parseInt(b))

  document.getElementById('random_result').innerText = nums.join(',')
  document.getElementById('random_count_text').innerText = nums.length + ' số'
  document.getElementById('random_actions').style.display = 'flex'

  save()
}

function run3D4D(){

  const d3 = document.getElementById('d3_input').value
  const d4 = document.getElementById('d4_input').value

  let r = []

  if(d3){
    const m = d3.match(/\d{3}/g)
    if(m) r = [...r, ...m]
  }

  if(d4){
    const m = d4.match(/\d{4}/g)
    if(m) r = [...r, ...m]
  }

  r = [...new Set(r)]

  document.getElementById('kq3d4d').innerText = r.join(',')
}

function calcTab7(){

const c5 = (document.getElementById('t7_cang5').value.match(/\d/g)||[])
const c4 = (document.getElementById('t7_cang4').value.match(/\d/g)||[])
const c3 = (document.getElementById('t7_cang3').value.match(/\d/g)||[])

let d2 = (document.getElementById('t7_dan2').value.match(/\d{2}/g)||[])
document.getElementById('t7_dan2').value = d2.join(',')

const cham = digits('t7_cham')
const tong = digits('t7_tong')
const dau  = digits('t7_dau')
const duoi = digits('t7_duoi')
const boRaw = pairs('t7_bo')

const them = pairs('t7_them')
const boSo = pairs('t7_boSo')

let r = d2.length ? [...d2] : []

if(!r.length && (cham.length || tong.length || dau.length || duoi.length || boRaw.length)){
  r = [...ALL_NUMS]
}

/* ===== BỘ ===== */

let bo = []

if(boRaw.length){

  boRaw.forEach(num=>{

    const a = +num[0]
    const b = +num[1]

    const ba = (a+5)%10
    const bb = (b+5)%10

    bo.push(
      ''+a+b,''+b+a,
      ''+a+bb,''+bb+a,
      ''+ba+b,''+b+ba,
      ''+ba+bb,''+bb+ba
    )

  })

  bo = [...new Set(bo)]

}

/* ===== LỌC 2D ===== */

if(cham.length)
r=r.filter(n=>cham.includes(+n[0])||cham.includes(+n[1]))

if(tong.length)
r=r.filter(n=>tong.includes((+n[0]+ +n[1])%10))

if(dau.length)
r=r.filter(n=>dau.includes(+n[0]))

if(duoi.length)
r=r.filter(n=>duoi.includes(+n[1]))

if(bo.length)
r=r.filter(n=>bo.includes(n))

/* ===== THÊM ===== */

if(them.length){
  if(!r.length) r = [...them]
  else r = r.filter(x => them.includes(x))
}

/* ===== BỎ ===== */

if(boSo.length){
  if(!r.length) r = [...ALL_NUMS]
  r = r.filter(x => !boSo.includes(x))
}

/* ===== GHÉP ===== */

let kq=[...r]

if(c3.length && kq.length){
let tmp=[]
c3.forEach(c=>{
kq.forEach(n=>{
tmp.push(c+n)
})
})
kq=tmp
}

if(c4.length && kq.length){
let tmp=[]
c4.forEach(c=>{
kq.forEach(n=>{
tmp.push(c+n)
})
})
kq=tmp
}

if(c5.length && kq.length){
let tmp=[]
c5.forEach(c=>{
kq.forEach(n=>{
tmp.push(c+n)
})
})
kq=tmp
}

kq=[...new Set(kq)].sort()

document.getElementById('t7r').innerText = kq.join(',')
document.getElementById('t7c').innerText = kq.length ? kq.length+' số' : ''

}

document.getElementById('t7r').innerText
)
