<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Tool Lô</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#111111">
<link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
<link rel="icon" type="image/png" sizes="512x512" href="icon-512.png">
<link rel="apple-touch-icon" sizes="512x512" href="icon-512.png">
<style>
.tab-title{
  text-align:center;
  font-weight:900;
  font-size:20px;
  padding:12px 0;
  color:#00ffee;
  letter-spacing:1.5px;
  text-shadow:0 0 8px #00ffee88;
}
*{
  box-sizing: border-box;
}
body{
  margin:0;
  background:linear-gradient(180deg,#000c12,#001f2b);
  color:#00ffee;
}

.tabs{
  display:flex;
  gap:8px;
  margin-bottom:10px;
  overflow-x:auto;
  -webkit-overflow-scrolling:touch;
}
.tab-btn{
  flex:1;
  height:6px;
  border-radius:6px;
  background:#e1e3e8;
}

.tab-btn.active{
  background:#00ffee;
  box-shadow:0 0 8px #00ffee88;
}
.tab-btn.active{background:#fff;box-shadow:0 2px 6px rgba(0,0,0,.1)}
.tab{display:none}
.tab.active{display:block}

.box{
  background:#001f2b;
  border:1px solid #00ffee22;
  border-radius:14px;
  padding:12px;
  margin-bottom:12px;
}
.title{text-align:center;font-weight:700;margin-bottom:6px}
.inputs{display:flex;gap:8px;margin-bottom:6px}
.inputs input{
  background:#002633;
  border:1px solid #00ffee55;
  color:#00ffee;
  padding:10px;
  border-radius:8px;
}
input,textarea{
  width:100%;padding:13px;border:none;border-radius:14px;
  background:#f1f2f4;text-align:center;font-weight:700;font-size:16px
}
textarea{resize:none}

.result{word-break:break-word;font-weight:800;color:#0b7a32}
.count{font-size:12px;color:#666;text-align:center}

.actions{display:none;gap:8px;margin-top:6px}
button{flex:1;padding:12px;border:none;border-radius:14px;font-weight:800}
.copy{background:#1976ff;color:#fff}
.del{background:#e53935;color:#fff}

#tab2 textarea{min-height:40px;font-size:14px;padding:8px}
.container{
  background:transparent;
}
</style>
</head>

<body>
<div class="container">
<div id="tabTitle" class="tab-title">CHẠM TỔNG</div>
<div id="tab1" class="tab active"></div>
<div id="tab2" class="tab"></div>
<div id="tab3" class="tab"></div>
<div id="tab4" class="tab"></div>
<div id="tab5" class="tab"></div>
</div>

<script>
const MIN=4, MAX=80
const ALL_NUMS = Array.from({length:100},(_,i)=>i.toString().padStart(2,'0'))
const KEY='tool_lo12_fix'

/* TAB */
function showTab(i){

  document.querySelectorAll('.tab')
    .forEach((t,n)=>t.classList.toggle('active',n===i));

  document.querySelectorAll('.tab-btn')
    .forEach((b,n)=>b.classList.toggle('active',n===i));

  const titles = [
    "CHẠM TỔNG",
    "GHÉP TRÙNG",
    "DÀN PHỨC HỢP",
    "BỘ TỔNG",
    "CHÉM DÀN"
  ];

  document.getElementById("tabTitle").innerText = titles[i] || "";
}
/* SAVE */
function save(){
  const d={}
  document.querySelectorAll('input,textarea').forEach(e=>d[e.id]=e.value)

  d.gr = document.getElementById('gr')?.innerText || ''
d.gc = document.getElementById('gc')?.innerText || ''
d.random_result = document.getElementById('random_result')?.innerText || '';
d.random_count_text = document.getElementById('random_count_text')?.innerText || '';
  d.chem_result = document.getElementById('chem_result')?.innerText || ''
  d.chem_count  = document.getElementById('chem_count')?.innerText || ''

  localStorage.setItem(KEY,JSON.stringify(d))
}
function load(){
  const d = JSON.parse(localStorage.getItem(KEY) || '{}')

  // Restore input + textarea
  Object.keys(d).forEach(id=>{
    const e = document.getElementById(id)
    if(!e) return

    if(e.tagName === 'INPUT' || e.tagName === 'TEXTAREA'){
      e.value = d[id]
    }
  })

  /* ===== TAB 2 – GHÉP TRÙNG ===== */
  if(d.gr){
    document.getElementById('gr').innerText = d.gr
    document.getElementById('gc').innerText = d.gc || ''
    document.getElementById('gact').style.display = 'flex'
  }else{
    document.getElementById('gact').style.display = 'none'
  }

  /* ===== TAB 5 – RANDOM ===== */
  if(d.random_result){
    document.getElementById('random_result').innerText = d.random_result
    document.getElementById('random_actions').style.display = 'flex'
  }else{
    document.getElementById('random_actions').style.display = 'none'
  }

  if(d.random_count_text){
    document.getElementById('random_count_text').innerText = d.random_count_text
  }

  /* ===== TAB 5 – CHÉM ===== */
  if(d.chem_result){
    document.getElementById('chem_result').innerText = d.chem_result
    document.getElementById('chem_actions').style.display = 'flex'
  }else{
    document.getElementById('chem_actions').style.display = 'none'
  }

  if(d.chem_count){
    document.getElementById('chem_count').innerText = d.chem_count
  }
}
/* TOOL */
const digits=id=>document.getElementById(id).value.replace(/\D/g,'').split('').map(Number)
const pairs=id=>document.getElementById(id).value.match(/\d{2}/g)||[]

/* ================= TAB 1 – CHẠM TỔNG ================= */
function gen(ch,tg,dau,duoi){
  return ALL_NUMS.filter(num=>{
    const a = +num[0]
    const b = +num[1]

    if(ch.length && !(ch.includes(a)||ch.includes(b))) return false
    if(tg.length && !tg.includes((a+b)%10)) return false
    if(dau.length && !dau.includes(a)) return false
    if(duoi.length && !duoi.includes(b)) return false

    return true
  })
}

function calc1(i){
  const ch = digits('ch'+i)
  const tg = digits('to'+i)
  const add = pairs('add'+i)
  const sub = pairs('sub'+i)
  const dau = digits('da'+i)
  const duoi = digits('du'+i)
  let r=[]

  if(ch.length || tg.length || dau.length || duoi.length){
  r = gen(ch,tg,dau,duoi)
}

  if(!r.length && sub.length){
    for(let x=0;x<=9;x++)
      for(let y=0;y<=9;y++)
        r.push(`${x}${y}`)
  }

  if(add.length){
    r = r.length ? r.filter(x=>add.includes(x)) : [...add]
  }

  if(sub.length){
    r = r.filter(x=>!sub.includes(x))
  }

  r=[...new Set(r)].sort()
  out1(i,r)
  auto1()
  save()
}

function out1(i,a){
  document.getElementById('r'+i).innerText=a.join(',')
  document.getElementById('c'+i).innerText=a.length?a.length+' số':''
  document.querySelector('#b1_'+i+' .actions').style.display=a.length?'flex':'none'
}

function auto1(){
  let last=MIN

  for(let i=1;i<=MAX;i++){

    const hasValue =
      ch(i) ||
      to(i) ||
      document.getElementById('da'+i)?.value ||
      document.getElementById('du'+i)?.value ||
      addv(i) ||
      subv(i)

    if(hasValue) last=i+1
  }

  last=Math.min(MAX,Math.max(MIN,last))

  for(let i=1;i<=MAX;i++)
    document.getElementById('b1_'+i).style.display=i<=last?'block':'none'
}
const ch=i=>document.getElementById('ch'+i).value
const to=i=>document.getElementById('to'+i).value
const addv=i=>document.getElementById('add'+i).value
const subv=i=>document.getElementById('sub'+i).value

function render1(){
  let h=''
  for(let i=1;i<=MAX;i++){
    h+=`
    <div class="box" id="b1_${i}">
      <div class="title">DÀN ${i}</div>
      <div class="inputs">
        <input id="ch${i}" placeholder="CHẠM" oninput="calc1(${i})">
        <input id="to${i}" placeholder="TỔNG" oninput="calc1(${i})">
      </div>
<div class="inputs">
  <input id="da${i}" placeholder="ĐẦU" oninput="calc1(${i})">
  <input id="du${i}" placeholder="ĐUÔI" oninput="calc1(${i})">
</div>
      <div class="inputs">
        <input id="add${i}" placeholder="THÊM"
       inputmode="none"
       autocomplete="off"
       onpaste="setTimeout(()=>calc1(${i}),0)">

<input id="sub${i}" placeholder="BỎ"
       inputmode="none"
       autocomplete="off"
       onpaste="setTimeout(()=>calc1(${i}),0)">
      </div>
      <div class="result" id="r${i}"></div>
      <div class="count" id="c${i}"></div>
      <div class="actions">
        <button class="copy" onclick="navigator.clipboard.writeText(r${i}.innerText)">COPY</button>
        <button class="del" onclick="['ch','to','da','du','add','sub']
.forEach(x=>document.getElementById(x+'${i}').value='');calc1(${i})">
XOÁ
</button>
      </div>
    </div>`
  }
  tab1.innerHTML=h
}
function autoP(){
  let last=MIN
  for(let i=1;i<=MAX;i++){
    if(
      document.getElementById('pa'+i)?.value ||
      document.getElementById('pb'+i)?.value ||
      document.getElementById('pch'+i)?.value ||
      document.getElementById('pto'+i)?.value ||
      document.getElementById('pda'+i)?.value ||
      document.getElementById('pdu'+i)?.value ||
      document.getElementById('padd'+i)?.value ||
      document.getElementById('psub'+i)?.value
    ) last=i+1
  }
  last=Math.min(MAX,Math.max(MIN,last))
  for(let i=1;i<=MAX;i++){
    let box=document.getElementById('pbox'+i)
    if(box) box.style.display=i<=last?'block':'none'
  }
}
/* ================= TAB 2 – GHÉP TRÙNG ================= */
function render2(){
  let h=''
  for(let i=1;i<=MAX;i++){
    h+=`
    <div class="box" id="gbox${i}">
      <div class="title">DÀN ${i}</div>
      <textarea id="g${i}" oninput="calcG()"></textarea>
      <div class="actions" style="display:flex">
        <button class="copy" onclick="pasteG(${i})">DÁN</button>
        <button class="del" onclick="document.getElementById('g${i}').value='';calcG()">XOÁ</button>
      </div>
    </div>`
  }
  h+=`
  <div class="box">
    <div class="title">KẾT QUẢ</div>
    <div class="result" id="gr"></div>
    <div class="count" id="gc"></div>
    <div class="actions" id="gact">
  <button class="copy" onclick="navigator.clipboard.writeText(document.getElementById('gr').innerText)">COPY</button>
  <button class="copy" onclick="calcUnion()">GHÉP DÀN</button>
  <button class="copy" onclick="calcG()">GHÉP TRÙNG</button>
  <button class="del" onclick="clearG()">XOÁ</button>
</div>
<div id="diffButtons" style="display:flex;flex-wrap:wrap;margin-top:6px"></div>
  </div>`
  tab2.innerHTML=h
  autoG()
}

async function pasteG(i){
  const t=await navigator.clipboard.readText()
  document.getElementById('g'+i).value=[...new Set(t.match(/\d{2}/g)||[])].join(',')
  calcG()
}

function calcG(){

  let sets = []

  for(let i=1;i<=MAX;i++){
    const v = document.getElementById('g'+i).value.trim()
    if(v){
      sets.push(
        [...new Set(v.match(/\d{2}/g) || [])]
      )
    }
  }

  if(sets.length < 2){
  document.getElementById('gr').innerText = ''
  document.getElementById('gc').innerText = ''
  document.getElementById('gact').style.display = 'none'
  document.getElementById('diffButtons').innerHTML = ''   // thêm dòng này
  save()
  return
}

  // intersection chuẩn
  let r = sets[0]

  for(let i=1;i<sets.length;i++){
    const setB = new Set(sets[i])
    r = r.filter(x => setB.has(x))
  }

  r = [...new Set(r)].sort()

  document.getElementById('gr').innerText = r.join(',')
  document.getElementById('gc').innerText = r.length ? r.length + ' số' : ''
  document.getElementById('gact').style.display = r.length ? 'flex' : 'none'

  generateDiffButtons()
  autoG()
  save()
}
function calcUnion(){

  let all = []

  for(let i=1;i<=MAX;i++){
    const v = document.getElementById('g'+i).value.trim()
    if(v){
      all.push(...(v.match(/\d{2}/g) || []))
    }
  }

  let r = [...new Set(all)]
  .map(x=>parseInt(x))
  .sort((a,b)=>a-b)
  .map(x=>x.toString().padStart(2,'0'))

  document.getElementById('gr').innerText = r.join(',')
  document.getElementById('gc').innerText =
    r.length ? r.length + ' số' : ''

  document.getElementById('gact').style.display =
    r.length ? 'flex' : 'none'

  generateDiffButtons()
  save()
}

function autoG(){
  let last=MIN
  for(let i=1;i<=MAX;i++){
    if(document.getElementById('g'+i).value.trim()) last=i+1
  }
  last=Math.min(MAX,Math.max(MIN,last))
  for(let i=1;i<=MAX;i++)
    document.getElementById('gbox'+i).style.display=i<=last?'block':'none'
}
function clearG(){
  for(let i=1;i<=MAX;i++) 
    document.getElementById('g'+i).value=''

  document.getElementById('gr').innerText = ''
  document.getElementById('gc').innerText = ''
  document.getElementById('gact').style.display = 'none'
  document.getElementById('diffButtons').innerHTML = ''  // thêm dòng này

  save()
}
function generateDiffButtons(){

  const container = document.getElementById('diffButtons')
  if(!container) return

  container.innerHTML = ''

  let filled = []

  for(let i=1;i<=MAX;i++){
    const v = document.getElementById('g'+i)?.value.trim()
    if(v) filled.push(i)
  }

  if(filled.length < 2){
    container.innerHTML = ''
    return
  }

  for(let i=0;i<filled.length;i++){
    for(let j=i+1;j<filled.length;j++){

      const a = filled[i]
      const b = filled[j]

      const btn1 = document.createElement('button')
      btn1.className = 'copy'
      btn1.innerText = `Dàn ${a} loại dàn ${b}`
      btn1.onclick = ()=> diffPair(a,b)
      container.appendChild(btn1)

      const btn2 = document.createElement('button')
      btn2.className = 'copy'
      btn2.innerText = `Dàn ${b} loại dàn ${a}`
      btn2.onclick = ()=> diffPair(b,a)
      container.appendChild(btn2)
    }
  }
}
function getDan(i){
  const v = document.getElementById('g'+i)?.value.trim()
  return v ? [...new Set(v.match(/\d{2}/g)||[])] : []
}

function diffPair(a,b){

  const A = getDan(a)
  const B = new Set(getDan(b))

  const result = A
  .filter(x=>!B.has(x))
  .map(x=>parseInt(x))
  .sort((a,b)=>a-b)
  .map(x=>x.toString().padStart(2,'0'))
  document.getElementById('gr').innerText = result.join(',')
  document.getElementById('gc').innerText =
    result.length ? result.length + ' số' : ''

  document.getElementById('gact').style.display =
    result.length ? 'flex' : 'none'

  save()
}
/* ================= TAB 3 – DÀN PHỨC HỢP ================= */
function render3(){
  let h=''
  for(let i=1;i<=MAX;i++){
    h+=`
    <div class="box" id="pbox${i}">
      <div class="title">DÀN ${i}</div>
      <div class="inputs">
        <input id="pa${i}" placeholder="SỐ A" oninput="calcP(${i})">
        <input id="pb${i}" placeholder="SỐ B" oninput="calcP(${i})">
      </div>
      <div class="inputs">
        <input id="pch${i}" placeholder="CHẠM" oninput="calcP(${i})">
        <input id="pto${i}" placeholder="TỔNG" oninput="calcP(${i})">
      </div>
<div class="inputs">
  <input id="pda${i}" placeholder="ĐẦU" oninput="calcP(${i})">
  <input id="pdu${i}" placeholder="ĐUÔI" oninput="calcP(${i})">
</div>

<div class="inputs">
  <input id="padd${i}" placeholder="THÊM" oninput="calcP(${i})">
  <input id="psub${i}" placeholder="BỎ" oninput="calcP(${i})">
</div>
      <div class="result" id="pr${i}"></div>
      <div class="count" id="pc${i}"></div>
      <div class="actions">
        <button class="copy" onclick="navigator.clipboard.writeText(pr${i}.innerText)">COPY</button>
        <button class="del" onclick="['pa','pb','pch','pto','pda','pdu','padd','psub'].forEach(x=>document.getElementById(x+'${i}').value='');calcP(${i})">XOÁ</button>
      </div>
    </div>`
  }
  tab3.innerHTML=h
  autoP()
}

function calcP(i){

  const a = digits('pa'+i)
  const b = digits('pb'+i)
  const ch = digits('pch'+i)
  const tg = digits('pto'+i)

  const dau = digits('pda'+i)
  const duoi = digits('pdu'+i)
  const add = pairs('padd'+i)
  const sub = pairs('psub'+i)

  let r = []

  // Nếu có A và B → sinh từ A × B
  if(a.length && b.length){
    a.forEach(x=>b.forEach(y=>{
      r.push(''+x+y)
      r.push(''+y+x)
    }))
  }

  // Nếu không có A,B mà có điều kiện khác → chạy 100 số
  if(!r.length && (ch.length || tg.length || dau.length || duoi.length)){
    r = [...ALL_NUMS]
  }

  // Lọc chạm
  if(ch.length)
    r = r.filter(n=>ch.includes(+n[0])||ch.includes(+n[1]))

  // Lọc tổng
  if(tg.length)
    r = r.filter(n=>tg.includes((+n[0]+ +n[1])%10))

  // Lọc đầu
  if(dau.length)
    r = r.filter(n=>dau.includes(+n[0]))

  // Lọc đuôi
  if(duoi.length)
    r = r.filter(n=>duoi.includes(+n[1]))

  // Thêm
  if(add.length)
    r = r.length ? r.filter(x=>add.includes(x)) : [...add]

  // Bỏ
  if(sub.length){
    if(!r.length) r=[...ALL_NUMS]
    r = r.filter(x=>!sub.includes(x))
  }

  r=[...new Set(r)].sort()

  document.getElementById('pr'+i).innerText=r.join(',')
  document.getElementById('pc'+i).innerText=r.length?r.length+' số':''
  document.querySelector('#pbox'+i+' .actions').style.display=r.length?'flex':'none'

  autoP()
  save()
}
/* ================= TAB 4 – BỘ TỔNG ================= */
const bong=n=>(n+5)%10

function render4(){
  let h=''
  for(let i=1;i<=MAX;i++){
    h+=`
    <div class="box" id="tbox${i}">
      <div class="title">DÀN ${i}</div>

      <div class="inputs">
  <input id="tb${i}" placeholder="BỘ" oninput="calcT(${i})">
</div>

<div class="inputs">
  <input id="tch${i}" placeholder="CHẠM" oninput="calcT(${i})">
  <input id="tt${i}" placeholder="TỔNG" oninput="calcT(${i})">
</div>

<div class="inputs">
  <input id="tda${i}" placeholder="ĐẦU" oninput="calcT(${i})">
  <input id="tdu${i}" placeholder="ĐUÔI" oninput="calcT(${i})">
</div>

<div class="inputs">
  <input id="tadd${i}" placeholder="THÊM" oninput="calcT(${i})">
  <input id="tsub${i}" placeholder="BỎ" oninput="calcT(${i})">
</div>

      <div class="result" id="tr${i}"></div>
      <div class="count" id="tc${i}"></div>

      <div class="actions">
        <button class="copy" onclick="navigator.clipboard.writeText(tr${i}.innerText)">COPY</button>
        <button class="del" onclick="['tb','tt','tch','tda','tdu','tadd','tsub'].forEach(x=>document.getElementById(x+'${i}').value='');calcT(${i})">XOÁ</button>
      </div>
    </div>`
  }
  tab4.innerHTML=h
  autoT()
}

function calcT(i){

  const raw = pairs('tb'+i)
  const tong = digits('tt'+i)
  const cham = digits('tch'+i)
  const add = pairs('tadd'+i)
  const sub = pairs('tsub'+i)
  const dau  = digits('tda'+i)
  const duoi = digits('tdu'+i)
  let r = []

  // Nếu có bộ → sinh từ bộ
  if(raw.length){
    raw.forEach(num=>{
      const a=+num[0], b=+num[1]
      const ba=bong(a), bb=bong(b)
      r.push(
        ''+a+b,''+b+a,
        ''+a+bb,''+bb+a,
        ''+ba+b,''+b+ba,
        ''+ba+bb,''+bb+ba
      )
    })
    r=[...new Set(r)]
  }

if(!raw.length && (tong.length || cham.length || dau.length || duoi.length)){
  r=[...ALL_NUMS]
}

  // Lọc tổng
  if(tong.length){
    r=r.filter(n=>tong.includes((+n[0]+ +n[1])%10))
  }

  // Lọc chạm
  if(cham.length){
    r=r.filter(n=>cham.includes(+n[0])||cham.includes(+n[1]))
  }
// Lọc đầu
if(dau.length){
  r = r.filter(n => dau.includes(+n[0]))
}

// Lọc đuôi
if(duoi.length){
  r = r.filter(n => duoi.includes(+n[1]))
}
  // Thêm
  if(add.length){
    r = r.length ? r.filter(x=>add.includes(x)) : [...add]
  }

  // Bỏ
  if(sub.length){
    if(!r.length) r=[...ALL_NUMS]
    r=r.filter(x=>!sub.includes(x))
  }

  r=[...new Set(r)].sort()

  document.getElementById('tr'+i).innerText=r.join(',')
  document.getElementById('tc'+i).innerText=r.length?r.length+' số':''
  document.querySelector('#tbox'+i+' .actions').style.display=r.length?'flex':'none'

  autoT()
  save()
}

function autoT(){
  let last = MIN

  for(let i=1;i<=MAX;i++){
    if(
      document.getElementById('tb'+i).value ||
      document.getElementById('tch'+i).value ||
      document.getElementById('tt'+i).value ||
      document.getElementById('tda'+i).value ||
      document.getElementById('tdu'+i).value ||
      document.getElementById('tadd'+i).value ||
      document.getElementById('tsub'+i).value
    ){
      last = i + 1
    }
  }

  last = Math.min(MAX, Math.max(MIN, last))

  for(let i=1;i<=MAX;i++){
    document.getElementById('tbox'+i).style.display =
      i <= last ? 'block' : 'none'
  }
}

function getChemDan(){
  const raw = document.getElementById('chem_input').value;
  const arr = raw.match(/\d{2}/g) || [];

  // giữ nguyên thứ tự nhập, chỉ bỏ trùng
  return arr.filter((v,i)=>arr.indexOf(v)===i);
}
function runChem(type){

  const base = getChemDan()
  const sizeInit = base.length

  if(sizeInit < 2){
    alert('Dàn quá ít số')
    return
  }

  let output = ''
  let lastCount = 0

  for(let level = 9; level >= 0; level--){

    // 9x=100%, 8x=90% ... 0x=10%
    let percent = (level + 1) * 10
    let keep = Math.floor(sizeInit * (percent / 100))

    if(keep > sizeInit) keep = sizeInit
    if(keep < 1) keep = 1

    let size = base.length
    let r = []

    if(type === 'tren'){
      r = base.slice(0, keep)
    }

    else if(type === 'duoi'){
      r = base.slice(size - keep)
    }

    else if(type === 'hai'){
      let half = Math.floor(keep / 2)
      r = [
        ...base.slice(0, half),
        ...base.slice(size - (keep - half))
      ]
    }

    else if(type === 'giua'){
      let start = Math.floor((size - keep) / 2)
      r = base.slice(start, start + keep)
    }

    else{
      // nếu không truyền type → mặc định hạ từ đầu
      r = base.slice(0, keep)
    }

    lastCount = r.length

    output += level + 'x (' + r.length + ' số)\n'
    output += r.join(',') + '\n\n'
  }

  document.getElementById('chem_result').innerText = output
  document.getElementById('chem_count').innerText =
    '0x còn ' + lastCount + ' số'

  document.getElementById('chem_actions').style.display =
    lastCount ? 'flex' : 'none'

  save()
}
function haDan(){

  const base = getChemDan()

  if(base.length < 96){
    alert('Dàn phải đủ 96 số trở lên')
    return
  }

  const levels = [96,86,76,66,56,46,36,26,16,6]

  // random 1 lần duy nhất
  let shuffled = [...base].sort(() => Math.random() - 0.5)

  let output = ''

  for(let i = 0; i < levels.length; i++){

    let keep = levels[i]

    let subset = shuffled.slice(0, keep)

    output += keep + ' số\n'
    output += subset.join(',') + '\n\n'
  }

  document.getElementById('chem_result').innerText = output
}
function taoDan(){

  const base = getChemDan()
  const sizeInit = base.length

  if(sizeInit < 10){
    alert('Dàn phải >= 10 số')
    return
  }

  // xác định mốc bắt đầu (60 số -> 6x, 83 số -> 8x)
  let startX = Math.floor(sizeInit / 10)

  // random 1 lần duy nhất
  let shuffled = [...base].sort(() => Math.random() - 0.5)

  let output = ''
  let current = shuffled

  for(let x = startX; x >= 0; x--){

    let keep = x * 10

    if(keep < 1) keep = 1
    if(keep > sizeInit) keep = sizeInit

    current = current.slice(0, keep)

    output += x + 'x (' + current.length + ' số)\n'
    output += current.join(',') + '\n\n'
  }

  document.getElementById('chem_result').innerText = output

  document.getElementById('chem_count').innerText =
    'Mức cuối: ' + current.length + ' số'

  document.getElementById('chem_actions').style.display =
    current.length ? 'flex' : 'none'

  save()
}

function createRandomDan(){

  const input = document.getElementById('random_count')
  let qty = parseInt(input?.value) || 10

  // tối thiểu 10 số để đảm bảo đủ 10 đầu
  if(qty < 10) qty = 10
  if(qty > 100) qty = 100

  let nums = []

  // BƯỚC 1: đảm bảo mỗi đầu có ít nhất 1 số
  for(let d=0; d<=9; d++){
    let n = d.toString() + Math.floor(Math.random()*10).toString()
    nums.push(n)
  }

  // BƯỚC 2: thêm số ngẫu nhiên cho đủ qty
  while(nums.length < qty){
    let n = Math.floor(Math.random()*100)
      .toString()
      .padStart(2,'0')

    if(!nums.includes(n)){
      nums.push(n)
    }
  }

  // BƯỚC 3: sắp xếp từ bé tới lớn
  nums.sort((a,b)=>parseInt(a)-parseInt(b))

  const dan = nums.join(',')

  document.getElementById('random_result').innerText = dan
  document.getElementById('random_count_text').innerText = nums.length + ' số'

  // luôn giữ flex để nút không lệch
  document.getElementById('random_actions').style.display = 'flex'

  save()
}
function copyRandom(){
  let text = document.getElementById('random_result').innerText;
  navigator.clipboard.writeText(text);
}

function clearRandom(){
  document.getElementById('random_result').innerText='';
  document.getElementById('random_count_text').innerText='';
  document.getElementById('random_actions').style.display='none';
  save();   // thêm dòng này
}
